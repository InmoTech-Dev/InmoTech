name: 🚀 Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "shared/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # 1. Build y Push imagen a GHCR
      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push imagen backend a GHCR
        run: |
          docker build -t ghcr.io/inmotech-dev/inmotech-api:latest \
            -t ghcr.io/inmotech-dev/inmotech-api:${{ github.sha }} \
            -f api/Dockerfile .
          docker push ghcr.io/inmotech-dev/inmotech-api:latest
          docker push ghcr.io/inmotech-dev/inmotech-api:${{ github.sha }}

      # 2. Deploy en Oracle Cloud via SSH
      - name: Deploy en Oracle Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/inmotech-dev/inmotech-api:latest
            docker stop inmotech-api || true
            docker rm inmotech-api || true
            docker run -d \
              --name inmotech-api \
              --restart unless-stopped \
              -p 127.0.0.1:5000:5000 \
              -e NODE_ENV=production \
              -e PORT=5000 \
              -e DB_DIALECT=mssql \
              -e DB_SERVER=${{ secrets.DB_SERVER }} \
              -e DB_PORT=1433 \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} \
              -e CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }} \
              -e CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
              -e CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }} \
              -e EMAIL_HOST=${{ secrets.EMAIL_HOST }} \
              -e EMAIL_PORT=${{ secrets.EMAIL_PORT }} \
              -e EMAIL_USER=${{ secrets.EMAIL_USER }} \
              -e EMAIL_PASS=${{ secrets.EMAIL_PASS }} \
              -e EMAIL_FROM=${{ secrets.EMAIL_FROM }} \
              -e PUBLIC_API_URL=${{ secrets.PUBLIC_API_URL }} \
              -e FRONTEND_URL=${{ secrets.FRONTEND_URL }} \
              -e ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }} \
              -e COOKIE_SAMESITE=none \
              -e COOKIE_SECURE=true \
              -e AUTH_VALIDATE_ORIGIN=true \
              -e SETUP_ENABLE_ENDPOINT=${{ secrets.SETUP_ENABLE_ENDPOINT || 'false' }} \
              -e SETUP_SECRET_KEY=${{ secrets.SETUP_SECRET_KEY }} \
              ghcr.io/inmotech-dev/inmotech-api:latest
