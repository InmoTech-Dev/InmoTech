name: 🚀 Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "shared/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login a Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build y Push imagen Docker
        run: |
          docker build . -f api/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/inmotech-api:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/inmotech-api:latest \
            -t ghcr.io/inmotech-dev/inmotech-api:${{ github.sha }} \
            -t ghcr.io/inmotech-dev/inmotech-api:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/inmotech-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/inmotech-api:latest
          docker push ghcr.io/inmotech-dev/inmotech-api:${{ github.sha }}
          docker push ghcr.io/inmotech-dev/inmotech-api:latest

      - name: Deploy en Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/inmotech-api:${{ github.sha }}