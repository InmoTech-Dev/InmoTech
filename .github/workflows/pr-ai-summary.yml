name: AI PR Summary (Gemini Robot)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Instalar SDK de Google
        run: npm install @google/generative-ai

      - name: 4. Generar Descripción con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Obtener el diff
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          # Crear el script de ejecución
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          async function run() {
            try {
              // Inicializamos la versión estable de la API
              const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
              
              // Intentamos con el modelo Pro que tiene rutas más estables para cuentas nuevas
              const model = genAI.getGenerativeModel({ 
                model: "gemini-1.5-pro" 
              });

              const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 30000);
              
              if (!diff || diff.trim().length < 10) {
                console.log("⚠️ Diff muy corto, saltando...");
                return;
              }

              const prompt = `Actúa como Desarrollador Senior. Resume este DIFF de código en Markdown para un Pull Request:\n\n${diff}`;

              const result = await model.generateContent(prompt);
              const response = await result.response;
              const text = response.text();
              
              fs.writeFileSync("ai_description.md", text);
              console.log("✅ Generado con éxito");
            } catch (err) {
              console.error("❌ Error de API:", err.message);
              // Si falla el 1.5-pro, intentamos el flash como último recurso con el nombre completo
              try {
                 const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
                 const fallbackModel = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                 const result = await fallbackModel.generateContent("Hola, genera un resumen corto: " + diff);
                 const response = await result.response;
                 fs.writeFileSync("ai_description.md", response.text());
              } catch (innerErr) {
                 process.exit(1);
              }
            }
          }
          run();
          EOF

          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR actualizado!"
          fi