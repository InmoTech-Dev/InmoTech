name: AI PR Summary (Gemini 2.5 Robot)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install SDK
        run: npm install @google/generative-ai

      - name: 4. Generar Descripción (Modelo 2.5 Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          const wait = (ms) => new Promise(res => setTimeout(res, ms));

          async function run() {
            try {
              const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
              const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
              const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 35000);
              const prompt = `Actúa como Senior Dev. Resume este DIFF en Markdown:\n\n${diff}`;

              // Intentamos hasta 5 veces con esperas largas
              for (let i = 0; i < 5; i++) {
                try {
                  const result = await model.generateContent(prompt);
                  const response = await result.response;
                  fs.writeFileSync("ai_description.md", response.text());
                  console.log("✅ ¡Resumen generado con éxito!");
                  return;
                } catch (err) {
                  if (err.message.includes("429")) {
                    console.log(`⚠️ Cuota llena. Intento ${i+1}/5. Esperando 30 segundos...`);
                    await wait(30000); // Espera de 30 seg
                  } else {
                    throw err;
                  }
                }
              }
              console.error("❌ Se agotaron los reintentos por cuota.");
              process.exit(1);
            } catch (err) {
              console.error("❌ Error:", err.message);
              process.exit(1);
            }
          }
          run();          EOF

          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado."
          fi