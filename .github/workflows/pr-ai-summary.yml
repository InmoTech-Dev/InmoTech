name: AI PR Summary (Gemini Final)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Generar Descripción
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const fs = require("fs");

          async function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

          async function run() {
            const apiKey = process.env.GEMINI_API_KEY;
            const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 30000);
            if (!diff.trim()) {
              console.log("⚠️ Diff vacío, nada que resumir.");
              return;
            }

            // 1. DESCUBRIMIENTO AUTOMÁTICO DE MODELO CON PRIORIDAD (Usa v1 para mayor estabilidad)
            console.log("🔍 Descubriendo modelos disponibles...");
            let available = ["gemini-1.5-flash"]; // Fallback inicial
            try {
              const listRes = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`);
              const listData = await listRes.json();
              if (listData.models) {
                available = listData.models.map(m => m.name.split("/").pop());
                console.log("📦 Modelos disponibles (v1):", available.join(", "));
              }
            } catch (e) {
              console.log("⚠️ Error con v1, intentando v1beta...");
              const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
              const listData = await listRes.json();
              if (listData.models) available = listData.models.map(m => m.name.split("/").pop());
            }

            const priorityList = ["gemini-1.5-flash", "gemini-flash-latest", "gemini-1.5-flash-8b", "gemini-1.5-pro", "gemini-pro-latest", "gemini-pro"];
            const modelsToTry = priorityList.filter(p => available.includes(p));
            if (modelsToTry.length === 0) modelsToTry.push(available[0]);

            const promptText = `
            Actúa como Senior Developer. Analiza este DIFF y genera una descripción oficial siguiendo este formato:
            
            1. REGLA DE ORO: Mantén los encabezados exactos: "## 📋 Descripción", "## 🔗 Rama", "## ✅ Tipo de cambio", "## ✔️ Checklist antes de enviar".
            2. DEJA LAS SECCIONES "## 🧪 ¿Cómo lo probaste? (OBLIGATORIO)" Y "## 📸 Screenshots" CON SUS COMENTARIOS ORIGINALES DE MARKDOWN. No escribas nada en ellas.
            3. Analiza el código para marcar los [x] correspondientes en Tipo de cambio y Checklist.
            4. Si detectas archivos .env o console.log, menciónalo sutilmente en la descripción para que lo corrijan.
            
            DIFF DEL PR:
            ${diff}
            
            DEVUELVE SOLO EL TEXTO DE LA DESCRIPCIÓN EN MARKDOWN.
            `;

            // 2. SISTEMA DE REINTENTOS CON FALLBACK DE MODELO
            for (let modelName of modelsToTry) {
              console.log(`🤖 Probando modelo: ${modelName}...`);
              const url = `https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${apiKey}`;

              for (let i = 0; i < 2; i++) {
                try {
                  const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                  });

                  const data = await response.json();

                  if (response.status === 429) {
                    console.log(`⚠️ Límite excedido para ${modelName}. Esperando 8s...`);
                    await sleep(8000);
                    continue; // Reintenta el mismo modelo
                  }

                  if (data.candidates && data.candidates[0].content) {
                    fs.writeFileSync("ai_description.md", data.candidates[0].content.parts[0].text);
                    console.log(`✅ ¡Éxito con ${modelName}!`);
                    return;
                  } else {
                    console.error(`❌ Falló con ${modelName}:`, JSON.stringify(data));
                    break; // Sal del reintento de este modelo
                  }
                } catch (err) {
                  console.error(`❌ Error de red (${modelName}):`, err.message);
                  break;
                }
              }
            }
            console.error("💥 Todos los modelos fallaron o excedieron la cuota.");
            process.exit(1);
          }
          run();
          EOF
          
          # Instalar dependencias si faltan (aunque fetch es nativo en Node 20)
          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado exitosamente."
          else
            echo "❌ No se pudo generar la descripción."
            exit 1
          fi
