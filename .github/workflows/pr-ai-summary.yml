name: AI PR Summary (Gemini Final)

on:
  workflow_dispatch: # Permite ejecutar el robot manualmente desde el botón de GitHub
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Generar Descripción
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const fs = require("fs");

          async function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

          async function run() {
            const apiKey = process.env.GEMINI_API_KEY;
            const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 30000);
            if (!diff.trim()) {
              console.log("⚠️ Diff vacío, nada que resumir.");
              return;
            }

            // 1. DESCUBRIMIENTO HÍBRIDO CON MAPEADO DE VERSIÓN
            console.log("🔍 Descubriendo modelos en v1 y v1beta...");
            let modelMap = new Map(); // { model: version }
            for (let version of ["v1beta", "v1"]) {
              try {
                const res = await fetch(`https://generativelanguage.googleapis.com/${version}/models?key=${apiKey}`);
                const data = await res.json();
                if (data.models) {
                  data.models.forEach(m => {
                    const name = m.name.split("/").pop();
                    if (!modelMap.has(name)) modelMap.set(name, version);
                  });
                }
              } catch (e) {}
            }

            console.log("📦 Modelos encontrados:", Array.from(modelMap.keys()).join(", "));

            // Prioridad absoluta por estabilidad y cuota
            const priorityList = [
              "gemini-1.5-flash", "gemini-flash-latest", 
              "gemini-2.0-flash-lite", "gemini-1.5-pro", 
              "gemini-pro-latest", "gemini-pro"
            ];
            
            const modelsToTry = priorityList.filter(p => modelMap.has(p));
            if (modelsToTry.length === 0) modelsToTry.push(Array.from(modelMap.keys())[0]);

            const promptText = `
            Actúa como Senior Developer. Genera una descripción de Pull Request en Markdown:
            
            1. REGLA: Mantén los encabezados: "## 📋 Descripción", "## 🔗 Rama", "## ✅ Tipo de cambio", "## ✔️ Checklist antes de enviar".
            2. NO escribas nada en: "## 🧪 ¿Cómo lo probaste? (OBLIGATORIO)" y "## 📸 Screenshots". Deja sus comentarios <!-- --> intactos.
            3. Analiza el código para marcar [x] en Tipo de cambio y Checklist.
            
            DIFF:
            ${diff}
            
            DEVUELVE SOLO EL MARKDOWN.
            `;

            // 2. SISTEMA DE REINTENTOS CON VERSIÓN CORRECTA
            for (let modelName of modelsToTry) {
              const version = modelMap.get(modelName) || "v1beta";
              console.log(`🤖 Intentando con: ${modelName} vía ${version}...`);
              const url = `https://generativelanguage.googleapis.com/${version}/models/${modelName}:generateContent?key=${apiKey}`;

              for (let i = 0; i < 2; i++) {
                try {
                  const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                  });

                  const data = await response.json();

                  if (response.status === 429) {
                    console.log(`⚠️ Cuota excedida para ${modelName}. Esperando 12s...`);
                    await sleep(12000);
                    continue; 
                  }

                  if (data.candidates && data.candidates[0].content) {
                    fs.writeFileSync("ai_description.md", data.candidates[0].content.parts[0].text);
                    console.log(`✅ ¡Éxito total con ${modelName}!`);
                    return;
                  } else {
                    console.error(`❌ Falló con ${modelName}:`, JSON.stringify(data));
                    break; 
                  }
                } catch (err) {
                  console.error(`❌ Error (${modelName}):`, err.message);
                  break;
                }
              }
            }
            console.error("💥 No se pudo generar el resumen tras agotar los modelos.");
            process.exit(1);
          }
          run();
          EOF
          
          # Instalar dependencias si faltan (aunque fetch es nativo en Node 20)
          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado exitosamente."
          else
            echo "❌ No se pudo generar la descripción."
            exit 1
          fi
