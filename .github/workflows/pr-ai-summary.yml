name: AI PR Summary (Gemini 2.5 Robot)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install SDK
        run: npm install @google/generative-ai

      - name: 4. Generar Descripción (Modelo 2.5 Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          async function run() {
            try {
              const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
              
              // USAMOS EL MODELO QUE CONFIRMÓ TU CURL
              const model = genAI.getGenerativeModel({ 
                model: "gemini-2.5-flash" 
              });

              const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 35000);
              
              if (!diff || diff.trim().length < 10) {
                console.log("⚠️ Diff insuficiente.");
                return;
              }

              const prompt = `Actúa como Senior Developer. Resume este DIFF para un PR en Markdown:\n\n${diff}`;

              // Sistema de reintento simple por si hay error 429
              let attempts = 0;
              while (attempts < 3) {
                try {
                  const result = await model.generateContent(prompt);
                  const response = await result.response;
                  fs.writeFileSync("ai_description.md", response.text());
                  console.log("✅ Descripción generada con Gemini 2.5 Flash");
                  return;
                } catch (e) {
                  if (e.message.includes("429")) {
                    console.log("⏳ Cuota excedida, esperando 10s...");
                    await new Promise(r => setTimeout(r, 10000));
                    attempts++;
                  } else {
                    throw e;
                  }
                }
              }
            } catch (err) {
              console.error("❌ Error:", err.message);
              process.exit(1);
            }
          }
          run();
          EOF

          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado."
          fi