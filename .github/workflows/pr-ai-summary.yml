name: AI PR Summary (Gemini Final)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Generar Descripción
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const fs = require("fs");

          async function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

          async function run() {
            const apiKey = process.env.GEMINI_API_KEY;
            const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 30000);
            if (!diff.trim()) {
              console.log("⚠️ Diff vacío, nada que resumir.");
              return;
            }

            // 1. DESCUBRIMIENTO HÍBRIDO (v1 + v1beta)
            console.log("🔍 Descubriendo modelos en v1 y v1beta...");
            let available = new Set();
            for (let version of ["v1", "v1beta"]) {
              try {
                const res = await fetch(`https://generativelanguage.googleapis.com/${version}/models?key=${apiKey}`);
                const data = await res.json();
                if (data.models) data.models.forEach(m => available.add(m.name.split("/").pop()));
              } catch (e) {}
            }

            const availableList = Array.from(available);
            console.log("📦 Modelos encontrados:", availableList.join(", "));

            // Prioridad absoluta por estabilidad y cuota (Flash 1.5 es el mejor)
            const priorityList = [
              "gemini-1.5-flash", "gemini-flash-latest", 
              "gemini-2.0-flash-lite", "gemini-2.0-flash-lite-preview-02-05", 
              "gemini-1.5-pro", "gemini-pro-latest", 
              "gemini-2.0-flash", "gemini-2.5-flash-lite", "gemini-2.5-flash"
            ];
            
            const modelsToTry = priorityList.filter(p => available.has(p));
            if (modelsToTry.length === 0) modelsToTry.push(availableList[0]);

            const promptText = `
            Actúa como Senior Developer. Genera una descripción de Pull Request en Markdown:
            
            1. REGLA: Mantén los encabezados: "## 📋 Descripción", "## 🔗 Rama", "## ✅ Tipo de cambio", "## ✔️ Checklist antes de enviar".
            2. NO escribas nada en: "## 🧪 ¿Cómo lo probaste? (OBLIGATORIO)" y "## 📸 Screenshots". Deja sus comentarios <!-- --> intactos.
            3. Analiza el código para marcar [x].
            
            DIFF:
            ${diff}
            
            DEVUELVE SOLO EL MARKDOWN.
            `;

            // 2. SISTEMA DE REINTENTOS MÁS AGRESIVO
            for (let modelName of modelsToTry) {
              console.log(`🤖 Intentando con: ${modelName}...`);
              // Decidir versión de API según el modelo (v1beta suele ser más permisivo para modelos nuevos)
              const apiVersion = modelName.includes("2.") || modelName.includes("flash-lite") ? "v1beta" : "v1";
              const url = `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelName}:generateContent?key=${apiKey}`;

              for (let i = 0; i < 2; i++) {
                try {
                  const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                  });

                  const data = await response.json();

                  if (response.status === 429) {
                    console.log(`⚠️ Cuota excedida para ${modelName}. Esperando 12s para limpiar buffer...`);
                    await sleep(12000);
                    continue; // Reintenta el mismo
                  }

                  if (data.candidates && data.candidates[0].content) {
                    fs.writeFileSync("ai_description.md", data.candidates[0].content.parts[0].text);
                    console.log(`✅ ¡Éxito total con ${modelName}!`);
                    return;
                  } else {
                    console.error(`❌ Falló ${modelName}:`, JSON.stringify(data));
                    break; // Siguiente modelo
                  }
                } catch (err) {
                  console.error(`❌ Error (${modelName}):`, err.message);
                  break;
                }
              }
            }
            console.error("💥 No se pudo generar el resumen tras agotar los modelos.");
            process.exit(1);
          }
          run();
          EOF
          
          # Instalar dependencias si faltan (aunque fetch es nativo en Node 20)
          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado exitosamente."
          else
            echo "❌ No se pudo generar la descripción."
            exit 1
          fi
