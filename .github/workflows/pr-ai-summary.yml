name: AI PR Summary (Gemini Final)

on:
  workflow_dispatch: # Permite ejecutar el robot manualmente desde el botón de GitHub
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Generar Descripción (Groq Llama 3)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const fs = require("fs");

          async function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

          async function run() {
            const apiKey = process.env.GROQ_API_KEY;
            if (!apiKey) {
              console.log("⚠️ GROQ_API_KEY no encontrada. Por favor agrégala en los Secrets de GitHub.");
              process.exit(0);
            }

            // Llama 3 tiene un contexto excelente de 8k tokens. ~20000 caracteres encajan perfecto.
            const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 20000); 
            if (!diff.trim()) {
              console.log("⚠️ Diff vacío, nada que resumir.");
              return;
            }

            console.log("🤖 Conectando a la velocidad de la luz con Groq (Meta Llama 3 70B)...");

            const promptText = `
            Actúa como Senior Developer. Genera una descripción de Pull Request en Markdown:
            
            1. REGLA DE ORO: Mantén los encabezados exactos: "## 📋 Descripción", "## 🔗 Rama", "## ✅ Tipo de cambio", "## ✔️ Checklist antes de enviar".
            2. NO escribas nada en: "## 🧪 ¿Cómo lo probaste? (OBLIGATORIO)" y "## 📸 Screenshots". Deja sus comentarios <!-- --> intactos.
            3. Analiza el código para marcar [x] en Tipo de cambio y Checklist.
            4. Se super claro y profesional en la descripción.
            
            DIFF DEL PR:
            ${diff}
            
            DEVUELVE SOLO EL TEXTO DE LA DESCRIPCIÓN EN MARKDOWN PURO.
            `;

            for (let i = 0; i < 2; i++) {
              try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    model: "llama3-70b-8192",
                    messages: [{ role: "user", content: promptText }],
                    temperature: 0.3
                  })
                });

                const data = await response.json();

                if (response.status === 429) {
                    console.log("⚠️ Límite excedido (muy inusual en Groq). Esperando 5s...");
                    await sleep(5000);
                    continue; 
                }

                if (data.choices && data.choices[0].message) {
                  fs.writeFileSync("ai_description.md", data.choices[0].message.content);
                  console.log("✅ ¡Resumen generado instantáneamente por Meta Llama 3!");
                  return;
                } else {
                  console.error("❌ Falló la conexión con Groq:", JSON.stringify(data));
                  break; 
                }
              } catch (err) {
                console.error("❌ Error de red:", err.message);
                break;
              }
            }

            console.log("-----------------------------------------------------------------");
            console.log("⚠️ LA IA SE QUEDÓ SIN ENERGÍA.");
            console.log("Todo está bien, el PR puede continuar. Simplemente rellena la descripción a mano hoy.");
            console.log("-----------------------------------------------------------------");
            process.exit(0); // IMPORTANTE: Salir con 0 para no bloquear el PR
          }
          run();
          EOF
          
          # Ejecutar el script nativo de Node 20
          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado a la velocidad de la luz."
          else
            echo "ℹ️ La descripción de IA fue omitida porque hubo un error en Groq."
            echo "✅ El flujo finalizó sin errores para no bloquear tu trabajo."
            exit 0
          fi
