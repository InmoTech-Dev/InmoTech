name: AI PR Summary (Gemini Robot)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Generate AI Summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # 1. Asegurar que tenemos la rama base para comparar
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          # 2. Crear el script de Node con el modelo correcto
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          async function run() {
            try {
              const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
              
              // CAMBIO CLAVE: Usar "gemini-1.5-flash" (es el más estable y rápido)
              const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

              const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 50000);
              
              const prompt = `Actúa como Desarrollador Senior. Genera un resumen técnico para este Pull Request en Markdown.
              Incluye:
              ## 📋 Descripción (Resumen de cambios)
              ## ✅ Tipo de cambio (Bugfix, Feature, etc.)
              ## ✔️ Checklist (Cosas que detectes en el código)
              
              Usa este DIFF:
              ${diff}`;

              const result = await model.generateContent(prompt);
              const response = await result.response;
              fs.writeFileSync("ai_description.md", response.text());
              
            } catch (err) {
              console.error("Error crítico:", err.message);
              process.exit(1);
            }
          }
          run();
          EOF

          # 3. Ejecutar y actualizar el PR
          node summarize.js
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "✅ PR actualizado con éxito."
          fi