name: AI PR Summary (Gemini Robot)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Instalar SDK de Google
        run: npm install @google/generative-ai

      - name: 4. Generar Descripción con IA (Auto-Detect)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          async function run() {
            try {
              const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
              
              // --- BLOQUE DE AUTO-DETECCIÓN ---
              console.log("🔍 Buscando modelos disponibles...");
              let modelName = "";
              try {
                // Listamos los modelos para ver cuál tienes activo (flash, pro, etc.)
                // Esto evita el error 404 de nombres incorrectos
                const responseModels = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${process.env.GEMINI_API_KEY}`);
                const data = await responseModels.json();
                
                if (data.models) {
                  // Prioridad: 1.5-flash, luego 1.5-pro, luego gemini-pro
                  const bestModel = data.models.find(m => m.name.includes('1.5-flash')) 
                                 || data.models.find(m => m.name.includes('1.5-pro'))
                                 || data.models.find(m => m.name.includes('gemini-pro'));
                  
                  if (bestModel) {
                    modelName = bestModel.name;
                    console.log(`✅ Modelo detectado: ${modelName}`);
                  }
                }
              } catch (e) {
                console.log("⚠️ No se pudo listar, intentando fallback directo...");
              }

              // Si la auto-detección falló, usamos el nombre estándar completo
              if (!modelName) modelName = "models/gemini-1.5-flash";

              const model = genAI.getGenerativeModel({ model: modelName });
              const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 35000);
              
              const prompt = `Actúa como Desarrollador Senior. Resume este DIFF para un PR en Markdown:\n\n${diff}`;

              const result = await model.generateContent(prompt);
              const response = await result.response;
              
              fs.writeFileSync("ai_description.md", response.text());
              console.log("🚀 Resumen generado con éxito.");
            } catch (err) {
              console.error("❌ Error Fatal:", err.message);
              process.exit(1);
            }
          }
          run();
          EOF

          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
          fi