name: AI PR Summary (Gemini Final)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Generar Descripción
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const fs = require("fs");

          async function run() {
            const apiKey = process.env.GEMINI_API_KEY;
            const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 30000);
            if (!diff.trim()) {
              console.log("⚠️ Diff vacío, nada que resumir.");
              return;
            }

            // 1. DESCUBRIMIENTO AUTOMÁTICO DE MODELO (Solución definitiva para el 404)
            console.log("🔍 Descubriendo modelos disponibles para esta clave...");
            let modelName = "gemini-1.5-flash"; // Por defecto
            
            try {
              const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
              const listRes = await fetch(listUrl);
              const listData = await listRes.json();
              
              if (listData.models) {
                // Buscamos el mejor disponible: flash 1.5 -> pro 1.5 -> pro 1.0
                const available = listData.models.map(m => m.name.split("/").pop());
                console.log("📦 Modelos encontrados:", available.join(", "));
                
                if (available.includes("gemini-1.5-flash")) modelName = "gemini-1.5-flash";
                else if (available.includes("gemini-1.5-pro")) modelName = "gemini-1.5-pro";
                else if (available.includes("gemini-pro")) modelName = "gemini-pro";
                else modelName = available[0]; // Último recurso
              }
            } catch (e) {
              console.log("⚠️ No se pudo listar modelos, usando gemini-1.5-flash por defecto.");
            }

            console.log(`🤖 Usando modelo: ${modelName}`);

            const promptText = `
            Actúa como Senior Developer. Analiza este DIFF y genera una descripción siguiendo este formato:
            
            1. REGLA DE ORO: Mantén los encabezados exactos: "## 📋 Descripción", "## 🔗 Rama", "## ✅ Tipo de cambio", "## ✔️ Checklist antes de enviar".
            2. DEJA LAS SECCIONES "## 🧪 ¿Cómo lo probaste? (OBLIGATORIO)" Y "## 📸 Screenshots" CON SUS COMENTARIOS ORIGINALES. No escribas nada en ellas.
            
            DIFF:
            ${diff}
            
            DEVUELVE SOLO EL MARKDOWN PARA LA DESCRIPCIÓN.
            `;

            const prompt = {
              contents: [{ parts: [{ text: promptText }] }]
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

            try {
              const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(prompt)
              });

              const data = await response.json();

              if (data.candidates && data.candidates[0].content) {
                fs.writeFileSync("ai_description.md", data.candidates[0].content.parts[0].text);
                console.log("✅ Resumen generado exitosamente.");
              } else {
                console.error("❌ Error de la API (Respuesta):", JSON.stringify(data));
                process.exit(1);
              }
            } catch (err) {
              console.error("❌ Error de red:", err.message);
              process.exit(1);
            }
          }
          run();
          EOF

          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado."
          fi