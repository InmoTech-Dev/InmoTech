name: AI PR Summary (Gemini Robot)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Instalar SDK de Google
        run: npm install @google/generative-ai

      - name: 4. Generar Descripción con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Obtener la diferencia de código con la rama base
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          # Crear el script de ejecución (Archivo summarize.js)
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          async function run() {
            try {
              const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
              
              // Usamos el prefijo 'models/' y la versión flash que es rápida
              const model = genAI.getGenerativeModel({ 
                model: "models/gemini-1.5-flash" 
              });

              const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 40000);
              
              const prompt = `Actúa como Desarrollador Senior. Genera un resumen técnico para este PR en Markdown basado en el siguiente DIFF:\n\n${diff}`;

              const result = await model.generateContent(prompt);
              const response = await result.response;
              const text = response.text();
              
              fs.writeFileSync("ai_description.md", text);
              console.log("✅ Descripción generada correctamente.");
            } catch (err) {
              console.error("❌ Error Detallado:", err.message);
              process.exit(1);
            }
          }
          run();
          EOF

          # Ejecutar el script de Node
          node summarize.js
          
          # Actualizar el cuerpo del PR en GitHub usando GitHub CLI
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR actualizado exitosamente."
          fi