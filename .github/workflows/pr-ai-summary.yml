name: AI PR Summary (Gemini Final)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Generar Descripción
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const fs = require("fs");

          async function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

          async function run() {
            const apiKey = process.env.GEMINI_API_KEY;
            const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 30000);
            if (!diff.trim()) {
              console.log("⚠️ Diff vacío, nada que resumir.");
              return;
            }

            // 1. DESCUBRIMIENTO AUTOMÁTICO DE MODELO CON PRIORIDAD (Solución de Cuota)
            console.log("🔍 Descubriendo modelos disponibles...");
            let modelName = "";
            try {
              const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
              const listData = await listRes.json();
              
              if (listData.models) {
                const available = listData.models.map(m => m.name.split("/").pop());
                console.log("📦 Modelos disponibles:", available.join(", "));
                
                // Prioridad para modelos con mayor cuota gratuita
                const priority = ["gemini-1.5-flash", "gemini-flash-latest", "gemini-1.5-pro", "gemini-pro-latest", "gemini-pro"];
                modelName = priority.find(p => available.includes(p)) || available[0];
              }
            } catch (e) {
              modelName = "gemini-1.5-flash";
              console.log("⚠️ Error listando modelos, usando gemini-1.5-flash por defecto.");
            }

            console.log(`🤖 Usando modelo: ${modelName} (Elegido para evitar límites de cuota)`);

            const promptText = `
            Actúa como Senior Developer. Analiza este DIFF y genera una descripción oficial siguiendo este formato:
            
            1. REGLA DE ORO: Mantén los encabezados exactos: "## 📋 Descripción", "## 🔗 Rama", "## ✅ Tipo de cambio", "## ✔️ Checklist antes de enviar".
            2. DEJA LAS SECCIONES "## 🧪 ¿Cómo lo probaste? (OBLIGATORIO)" Y "## 📸 Screenshots" CON SUS COMENTARIOS ORIGINALES DE MARKDOWN. No escribas nada en ellas.
            3. Analiza el código para marcar los [x] correspondientes en Tipo de cambio y Checklist.
            4. Si detectas archivos .env o console.log, menciónalo sutilmente en la descripción para que lo corrijan.
            
            DIFF DEL PR:
            ${diff}
            
            DEVUELVE SOLO EL TEXTO DE LA DESCRIPCIÓN EN MARKDOWN.
            `;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

            // Reintento simple para errores 429
            for (let i = 0; i < 3; i++) {
              try {
                const response = await fetch(url, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                const data = await response.json();

                if (response.status === 429) {
                  console.log(`⚠️ Límite excedido (429). Reintentando en ${5 * (i+1)}s...`);
                  await sleep(5000 * (i+1));
                  continue;
                }

                if (data.candidates && data.candidates[0].content) {
                  fs.writeFileSync("ai_description.md", data.candidates[0].content.parts[0].text);
                  console.log("✅ Resumen generado exitosamente.");
                  return;
                } else {
                  console.error("❌ Error de la API:", JSON.stringify(data));
                  process.exit(1);
                }
              } catch (err) {
                console.error("❌ Error de red:", err.message);
                process.exit(1);
              }
            }
          }
          run();
          EOF
          
          # Instalar dependencias si faltan (aunque fetch es nativo en Node 20)
          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado exitosamente."
          else
            echo "❌ No se pudo generar la descripción."
            exit 1
          fi
