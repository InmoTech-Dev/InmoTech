name: AI PR Summary (Gemini Robot)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Instalar SDK de Google
        run: npm install @google/generative-ai

      - name: 4. Generar Descripción con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          async function run() {
            try {
              // FORZAMOS LA VERSIÓN V1 PARA EVITAR EL 404 DE LA BETA
              const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
              
              // Usamos el nombre del modelo sin prefijos raros, la librería v1 lo manejará
              const model = genAI.getGenerativeModel({ 
                model: "gemini-1.5-flash",
              }, { apiVersion: 'v1' }); // <--- ESTO ES LA CLAVE

              const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 35000);
              
              const prompt = `Actúa como Desarrollador Senior. Resume este DIFF para un PR en Markdown:\n\n${diff}`;

              const result = await model.generateContent(prompt);
              const response = await result.response;
              
              fs.writeFileSync("ai_description.md", response.text());
              console.log("✅ Éxito");
            } catch (err) {
              console.error("❌ Error:", err.message);
              process.exit(1);
            }
          }
          run();
          EOF

          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
          fi