name: AI PR Summary (Gemini Final)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Generar Descripción
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          
          cat << 'EOF' > summarize.js
          const fs = require("fs");

          async function run() {
            const apiKey = process.env.GEMINI_API_KEY;
            const diff = fs.readFileSync("pr_diff.txt", "utf8").substring(0, 30000);
            
            if (!diff.trim()) return;

            const prompt = {
              contents: [{
                parts: [{ text: "Actúa como Senior Dev. Resume este DIFF en Markdown:\n\n" + diff }]
              }]
            };

            // Intentamos con 1.5-flash que es el que tiene más cuota gratuita
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            try {
              const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(prompt)
              });

              const data = await response.json();

              if (data.candidates && data.candidates[0].content) {
                fs.writeFileSync("ai_description.md", data.candidates[0].content.parts[0].text);
                console.log("✅ Resumen generado.");
              } else {
                console.error("❌ Error de la API:", JSON.stringify(data));
                process.exit(1);
              }
            } catch (err) {
              console.error("❌ Error de red:", err.message);
              process.exit(1);
            }
          }
          run();
          EOF

          node summarize.js
          
          if [ -f ai_description.md ]; then
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🚀 PR Actualizado."
          fi