name: AI PR Summary (Gemini Robot - Debug Mode)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Instalar SDK de Google
        run: |
          echo "📦 Instalando @google/generative-ai..."
          npm install @google/generative-ai
          echo "✅ Instalación completada."

      - name: 4. Generar Descripción con IA (Logs Aumentados)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "🔍 --- INICIO DE DIAGNÓSTICO ---"
          echo "📌 PR Número: $PR_NUMBER"
          echo "📌 Rama Base: $BASE_REF"
          
          # Verificar si la API KEY existe (sin mostrarla)
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ ERROR: La variable GEMINI_API_KEY está vacía. Revisa los Secrets de GitHub."
            exit 1
          else
            echo "✅ GEMINI_API_KEY detectada (longitud: ${#GEMINI_API_KEY} caracteres)."
          fi

          # Obtener el diff y registrar su tamaño
          echo "Git: Obteniendo cambios contra origin/$BASE_REF..."
          git fetch origin $BASE_REF > /dev/null 2>&1
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          DIFF_SIZE=$(wc -c < pr_diff.txt)
          echo "📊 Tamaño del archivo de DIFF: $DIFF_SIZE bytes."

          if [ "$DIFF_SIZE" -lt 10 ]; then
            echo "⚠️ El DIFF es demasiado pequeño o está vacío. No hay nada que resumir."
            exit 0
          fi

          # Crear el script de ejecución con logs internos
          cat << 'EOF' > summarize.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          async function run() {
            console.log("🚀 Iniciando script de Node.js...");
            const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
            
            try {
              const modelName = "gemini-1.5-flash";
              console.log(`🤖 Solicitando modelo: ${modelName}...`);
              const model = genAI.getGenerativeModel({ model: modelName });

              const rawDiff = fs.readFileSync("pr_diff.txt", "utf8");
              const truncatedDiff = rawDiff.substring(0, 35000);
              console.log(`📝 Enviando prompt a Google (${truncatedDiff.length} caracteres)...`);

              const prompt = `Actúa como Desarrollador Senior. Resume este DIFF para un Pull Request en Markdown:\n\n${truncatedDiff}`;

              const result = await model.generateContent(prompt);
              console.log("⏳ Esperando respuesta de la API...");
              
              const response = await result.response;
              const text = response.text();

              if (!text) {
                throw new Error("La API devolvió una respuesta vacía.");
              }

              fs.writeFileSync("ai_description.md", text);
              console.log("✨ ¡Descripción generada y guardada en ai_description.md!");

            } catch (err) {
              console.error("\n--- 🛑 ERROR DETECTADO EN LA API ---");
              console.error(`Tipo de error: ${err.constructor.name}`);
              console.error(`Mensaje: ${err.message}`);
              
              if (err.message.includes("429")) {
                console.error("💡 Diagnóstico: Límite de cuota excedido (Too Many Requests).");
              } else if (err.message.includes("404")) {
                console.error("💡 Diagnóstico: Modelo no encontrado. Revisa el nombre del modelo o la región.");
              } else if (err.message.includes("403")) {
                console.error("💡 Diagnóstico: Error de autenticación. La API Key podría ser inválida.");
              }
              
              process.exit(1);
            }
          }
          run();
          EOF

          # Ejecutar y capturar salida
          echo "⚙️ Ejecutando summarize.js..."
          node summarize.js
          
          # Actualizar el PR
          if [ -f ai_description.md ]; then
            echo "⬆️ Subiendo descripción al PR #$PR_NUMBER..."
            gh pr edit $PR_NUMBER --body-file ai_description.md
            echo "🎉 ¡PR actualizado con éxito!"
          else
            echo "❌ No se encontró ai_description.md. Algo falló en el script anterior."
            exit 1
          fi